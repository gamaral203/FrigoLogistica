spring:
  application:
    name: logistica

  datasource:
    url: jdbc:postgresql://localhost:5432/frigologistica
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true